services:
  db:
    image: postgres:17-alpine
    container_name: ceicavs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ceicavs
      POSTGRES_PASSWORD: ceicavs
      POSTGRES_DB: ceicavs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: ceicavs-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
